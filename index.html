<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>裂縫深淵 Launcher</title>
  <style>
    :root {
      --bg: #06070d;
      --bg-2: #0b0f18;
      --text: #f5f7ff;
      --muted: rgba(245, 247, 255, 0.72);
      --line: rgba(255, 255, 255, 0.08);
      --accent: #8f7dff;
      --accent-2: #54d8ff;
      --duration: 4.2s;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: "Segoe UI", "Noto Sans TC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 50%, rgba(84, 216, 255, 0.04), transparent 16%),
        radial-gradient(circle at 50% 50%, rgba(143, 125, 255, 0.07), transparent 28%),
        linear-gradient(180deg, #05060a 0%, #090c14 48%, #05060a 100%);
      position: relative;
    }

    .noise,
    .dark-layer,
    .flash-layer,
    .end-cover,
    .vignette,
    .rift-wrap,
    .scene {
      position: fixed;
      inset: 0;
    }

    .noise,
    .dark-layer,
    .flash-layer,
    .end-cover,
    .vignette,
    .rift-wrap {
      pointer-events: none;
    }

    .noise {
      z-index: 1;
      opacity: 0.025;
      background-image:
        linear-gradient(rgba(255,255,255,0.35) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.35) 1px, transparent 1px);
      background-size: 4px 4px;
    }

    .scene {
      z-index: 2;
      transform-origin: center center;
    }

    .launcher {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
    }

    .launcher-inner {
      width: min(980px, 100%);
      text-align: center;
      position: relative;
      z-index: 3;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: rgba(245, 247, 255, 0.56);
      margin-bottom: 22px;
    }

    .title {
      font-size: clamp(62px, 11vw, 146px);
      line-height: 0.92;
      font-weight: 900;
      letter-spacing: 0.02em;
      text-shadow: 0 0 26px rgba(143, 125, 255, 0.08);
    }

    .divider {
      width: min(460px, 72vw);
      height: 1px;
      margin: 18px auto 22px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.16), transparent);
    }

    .description {
      max-width: 860px;
      margin: 0 auto;
      font-size: 15px;
      line-height: 1.9;
      color: rgba(245, 247, 255, 0.68);
    }

    .actions {
      margin-top: 34px;
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      min-width: 160px;
      padding: 14px 24px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      border-color: rgba(143, 125, 255, 0.28);
      background: rgba(255,255,255,0.05);
      box-shadow: 0 0 18px rgba(143, 125, 255, 0.1);
    }

    .btn-primary {
      background: linear-gradient(180deg, rgba(143, 125, 255, 0.16), rgba(255,255,255,0.04));
      border-color: rgba(143, 125, 255, 0.28);
    }

    .meta {
      margin-top: 28px;
      display: flex;
      gap: 18px;
      justify-content: center;
      flex-wrap: wrap;
      color: rgba(245, 247, 255, 0.54);
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .status {
      margin-top: 24px;
      min-height: 20px;
      color: rgba(84, 216, 255, 0.9);
      font-size: 13px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .dark-layer {
      z-index: 5;
      background: rgba(0, 0, 0, 0);
    }

    .vignette {
      z-index: 6;
      background: radial-gradient(circle at center, transparent 34%, rgba(0,0,0,0.18) 68%, rgba(0,0,0,0.46) 100%);
      opacity: 0.2;
    }

    .rift-wrap {
      z-index: 7;
      display: grid;
      place-items: center;
    }

    .rift {
      position: relative;
      width: 220px;
      height: 86vh;
      transform: rotate(8deg);
      transform-origin: center center;
    }

    .rift-beam,
    .rift-core,
    .rift-glow,
    .rift-aura {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 999px;
    }

    /* 初始就先看得到細裂縫 */
    .rift-beam {
      width: 2px;
      height: 78vh;
      background: linear-gradient(
        to bottom,
        transparent,
        rgba(84, 216, 255, 0.78),
        rgba(143, 125, 255, 1),
        rgba(84, 216, 255, 0.78),
        transparent
      );
      opacity: 0.52;
      filter: blur(0.4px);
      box-shadow: 0 0 10px rgba(84, 216, 255, 0.18);
    }

    .rift-core {
      width: 0px;
      height: 78vh;
      background: linear-gradient(to bottom, rgba(5, 6, 10, 0.98), rgba(2, 3, 6, 1), rgba(5, 6, 10, 0.98));
      opacity: 0;
    }

    .rift-glow {
      width: 14px;
      height: 78vh;
      background: linear-gradient(
        to bottom,
        transparent,
        rgba(84, 216, 255, 0.14),
        rgba(143, 125, 255, 0.18),
        rgba(84, 216, 255, 0.14),
        transparent
      );
      filter: blur(10px);
      opacity: 0.2;
    }

    .rift-aura {
      width: 90px;
      height: 180px;
      background: radial-gradient(circle, rgba(143,125,255,0.12), rgba(84,216,255,0.05), transparent 72%);
      filter: blur(28px);
      opacity: 0.08;
    }

    .flash-layer {
      z-index: 10;
      background: radial-gradient(circle at center, rgba(255,255,255,0.12), transparent 28%);
      opacity: 0;
    }

    .end-cover {
      z-index: 20;
      background: #020308;
      opacity: 0;
    }

    .hint {
      position: fixed;
      left: 50%;
      bottom: 38px;
      transform: translateX(-50%);
      z-index: 22;
      color: rgba(245,247,255,0.58);
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .hint.show {
      opacity: 1;
    }

    /* 一條時間軸：先浮起來，再打開，再吞滿 */
    body.playing .dark-layer {
      animation: darken var(--duration) linear forwards;
    }

    body.playing .vignette {
      animation: vignetteGrow var(--duration) linear forwards;
    }

    body.playing .launcher {
      animation: launcherSink var(--duration) linear forwards;
    }

    body.playing .scene {
      animation: cameraDive var(--duration) linear forwards;
    }

    body.playing .rift-beam {
      animation: beamRiseThenFade var(--duration) linear forwards;
    }

    body.playing .rift-core {
      animation: riftOpenThenConsume var(--duration) linear forwards;
    }

    body.playing .rift-glow {
      animation: glowOpenThenConsume var(--duration) linear forwards;
    }

    body.playing .rift-aura {
      animation: auraRiseThenConsume var(--duration) linear forwards;
    }

    body.playing .flash-layer {
      animation: flashIn var(--duration) linear forwards;
    }

    body.playing .end-cover {
      animation: endFade var(--duration) linear forwards;
    }

    @keyframes darken {
      0% { background: rgba(0,0,0,0); }
      100% { background: rgba(0,0,0,0.74); }
    }

    @keyframes vignetteGrow {
      0% { opacity: 0.2; }
      100% { opacity: 0.82; }
    }

    @keyframes launcherSink {
      0% {
        opacity: 1;
        transform: scale(1);
        filter: blur(0px);
      }
      20% {
        opacity: 0.78;
        transform: scale(0.997);
        filter: blur(0.2px);
      }
      35% {
        opacity: 0.42;
        transform: scale(0.99);
        filter: blur(1px);
      }
      100% {
        opacity: 0;
        transform: scale(0.95);
        filter: blur(8px);
      }
    }

    @keyframes beamRiseThenFade {
      0% {
        opacity: 0.52;
        transform: translate(-50%, -50%) scaleY(1);
        box-shadow: 0 0 10px rgba(84, 216, 255, 0.18);
      }
      12% {
        opacity: 0.82;
        transform: translate(-50%, -52%) scaleY(1.03);
        box-shadow: 0 0 16px rgba(84, 216, 255, 0.35), 0 0 28px rgba(143, 125, 255, 0.16);
      }
      22% {
        opacity: 1;
        transform: translate(-50%, -54%) scaleY(1.06);
        box-shadow: 0 0 18px rgba(84, 216, 255, 0.45), 0 0 32px rgba(143, 125, 255, 0.22);
      }
      32% {
        opacity: 0;
        transform: translate(-50%, -54%) scaleX(0.08) scaleY(1.06);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -54%) scaleX(0.08) scaleY(1.06);
      }
    }

    @keyframes riftOpenThenConsume {
      0% {
        width: 0px;
        height: 78vh;
        opacity: 0;
      }
      12% {
        width: 0px;
        height: 80vh;
        opacity: 0;
      }
      22% {
        width: 8px;
        height: 82vh;
        opacity: 1;
      }
      35% {
        width: 28px;
        height: 88vh;
        opacity: 1;
      }
      55% {
        width: 92vw;
        height: 135vh;
        opacity: 1;
      }
      75% {
        width: 156vw;
        height: 180vh;
        opacity: 1;
      }
      100% {
        width: 220vw;
        height: 220vh;
        opacity: 1;
      }
    }

    @keyframes glowOpenThenConsume {
      0% {
        width: 14px;
        height: 78vh;
        opacity: 0.2;
      }
      12% {
        width: 16px;
        height: 84vh;
        opacity: 0.45;
      }
      22% {
        width: 24px;
        height: 88vh;
        opacity: 0.75;
      }
      35% {
        width: 56px;
        height: 98vh;
        opacity: 1;
      }
      55% {
        width: 120vw;
        height: 148vh;
        opacity: 1;
      }
      75% {
        width: 190vw;
        height: 196vh;
        opacity: 1;
      }
      100% {
        width: 260vw;
        height: 240vh;
        opacity: 1;
      }
    }

    @keyframes auraRiseThenConsume {
      0% {
        width: 90px;
        height: 180px;
        opacity: 0.08;
        transform: translate(-50%, -50%);
      }
      12% {
        width: 130px;
        height: 240px;
        opacity: 0.22;
        transform: translate(-50%, -53%);
      }
      22% {
        width: 180px;
        height: 320px;
        opacity: 0.42;
        transform: translate(-50%, -56%);
      }
      35% {
        width: 260px;
        height: 430px;
        opacity: 0.78;
        transform: translate(-50%, -56%);
      }
      55% {
        width: 140vw;
        height: 140vh;
        opacity: 1;
        transform: translate(-50%, -56%);
      }
      75% {
        width: 230vw;
        height: 230vh;
        opacity: 1;
        transform: translate(-50%, -56%);
      }
      100% {
        width: 320vw;
        height: 320vh;
        opacity: 1;
        transform: translate(-50%, -56%);
      }
    }

    @keyframes cameraDive {
      0% {
        transform: scale(1);
        filter: blur(0px);
      }
      20% {
        transform: scale(1.04);
        filter: blur(0px);
      }
      35% {
        transform: scale(1.12);
        filter: blur(1px);
      }
      55% {
        transform: scale(1.48);
        filter: blur(4px);
      }
      75% {
        transform: scale(1.84);
        filter: blur(7px);
      }
      100% {
        transform: scale(2.2);
        filter: blur(10px);
      }
    }

    @keyframes flashIn {
      0%, 72% { opacity: 0; }
      100% { opacity: 1; }
    }

    @keyframes endFade {
      0%, 82% { opacity: 0; }
      100% { opacity: 1; }
    }

    @media (max-width: 700px) {
      .actions {
        width: 100%;
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }

      .title {
        font-size: 74px;
      }
    }
  </style>
</head>
<body>
  <div class="noise"></div>

  <div class="scene">
    <main class="launcher">
      <div class="launcher-inner">
        <p class="eyebrow">RIFT ABYSS LAUNCHER</p>
        <h1 class="title">裂縫深淵</h1>
        <div class="divider"></div>
        <p class="description">
          在世界崩裂之後，仍有人凝視深淵。真正的入口，不需要喧鬧，
          只需要足夠強的存在感。
        </p>

        <div class="actions">
          <button class="btn btn-primary" id="launchBtn">開始動畫</button>
          <button class="btn" id="replayBtn">重新播放</button>
        </div>

        <div class="meta">
          <span>Version 1.0.0</span>
          <span>Ready</span>
          <span>Windows Build</span>
        </div>

        <p class="status" id="statusText">SYSTEM READY</p>
      </div>
    </main>
  </div>

  <div class="dark-layer"></div>
  <div class="vignette"></div>

  <div class="rift-wrap">
    <div class="rift">
      <div class="rift-aura"></div>
      <div class="rift-glow"></div>
      <div class="rift-core"></div>
      <div class="rift-beam"></div>
    </div>
  </div>

  <div class="flash-layer"></div>
  <div class="end-cover"></div>
  <div class="hint" id="hint">動畫確認後，我再幫你把遊戲接進去</div>

  <script>
    const launchBtn = document.getElementById('launchBtn');
    const replayBtn = document.getElementById('replayBtn');
    const statusText = document.getElementById('statusText');
    const hint = document.getElementById('hint');
    const body = document.body;

    let endTimer = null;
    let playing = false;

    function setStatus(text) {
      statusText.textContent = text;
    }

    function resetAnimation() {
      if (endTimer) clearTimeout(endTimer);
      playing = false;
      hint.classList.remove('show');
      body.classList.remove('playing');

      void body.offsetWidth;

      setStatus('SYSTEM READY');
    }

    function playAnimation() {
      if (playing) return;
      resetAnimation();
      playing = true;
      setStatus('ENTERING THE RIFT...');
      body.classList.add('playing');

      endTimer = setTimeout(() => {
        setStatus('ENTRY COMPLETE');
        hint.classList.add('show');
        playing = false;
      }, 4200);
    }

    launchBtn.addEventListener('click', playAnimation);
    replayBtn.addEventListener('click', resetAnimation);
  </script>
</body>
</html>
