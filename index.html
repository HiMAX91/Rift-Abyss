<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>裂縫深淵 Launcher</title>
  <style>
    :root {
      --bg: #06070d;
      --bg-2: #0b0f18;
      --text: #f5f7ff;
      --muted: rgba(245, 247, 255, 0.72);
      --line: rgba(255, 255, 255, 0.08);
      --accent: #8f7dff;
      --accent-2: #54d8ff;
      --duration: 3.6s;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: "Segoe UI", "Noto Sans TC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 50%, rgba(84, 216, 255, 0.04), transparent 16%),
        radial-gradient(circle at 50% 50%, rgba(143, 125, 255, 0.07), transparent 28%),
        linear-gradient(180deg, #05060a 0%, #090c14 48%, #05060a 100%);
      position: relative;
    }

    .noise,
    .dark-layer,
    .flash-layer,
    .end-cover,
    .vignette,
    .rift-wrap,
    .scene {
      position: fixed;
      inset: 0;
    }

    .noise,
    .dark-layer,
    .flash-layer,
    .end-cover,
    .vignette,
    .rift-wrap {
      pointer-events: none;
    }

    .noise {
      z-index: 1;
      opacity: 0.025;
      background-image:
        linear-gradient(rgba(255,255,255,0.35) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.35) 1px, transparent 1px);
      background-size: 4px 4px;
    }

    .scene {
      z-index: 2;
      transform-origin: center center;
    }

    .launcher {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
    }

    .launcher-inner {
      width: min(980px, 100%);
      text-align: center;
      position: relative;
      z-index: 3;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: rgba(245, 247, 255, 0.56);
      margin-bottom: 22px;
    }

    .title {
      font-size: clamp(62px, 11vw, 146px);
      line-height: 0.92;
      font-weight: 900;
      letter-spacing: 0.02em;
      text-shadow: 0 0 26px rgba(143, 125, 255, 0.08);
    }

    .divider {
      width: min(460px, 72vw);
      height: 1px;
      margin: 18px auto 22px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.16), transparent);
    }

    .description {
      max-width: 860px;
      margin: 0 auto;
      font-size: 15px;
      line-height: 1.9;
      color: rgba(245, 247, 255, 0.68);
    }

    .actions {
      margin-top: 34px;
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      min-width: 160px;
      padding: 14px 24px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      border-color: rgba(143, 125, 255, 0.28);
      background: rgba(255,255,255,0.05);
      box-shadow: 0 0 18px rgba(143, 125, 255, 0.1);
    }

    .btn-primary {
      background: linear-gradient(180deg, rgba(143, 125, 255, 0.16), rgba(255,255,255,0.04));
      border-color: rgba(143, 125, 255, 0.28);
    }

    .meta {
      margin-top: 28px;
      display: flex;
      gap: 18px;
      justify-content: center;
      flex-wrap: wrap;
      color: rgba(245, 247, 255, 0.54);
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .status {
      margin-top: 24px;
      min-height: 20px;
      color: rgba(84, 216, 255, 0.9);
      font-size: 13px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .dark-layer {
      z-index: 5;
      background: rgba(0, 0, 0, 0);
    }

    .vignette {
      z-index: 6;
      background: radial-gradient(circle at center, transparent 34%, rgba(0,0,0,0.18) 68%, rgba(0,0,0,0.46) 100%);
      opacity: 0.2;
    }

    .rift-wrap {
      z-index: 7;
      display: grid;
      place-items: center;
    }

    .rift {
      position: relative;
      width: 220px;
      height: 86vh;
      transform: rotate(8deg);
      transform-origin: center center;
    }

    .rift-core,
    .rift-glow,
    .rift-aura,
    .rift-beam {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 999px;
    }

    .rift-beam {
      width: 2px;
      height: 78vh;
      background: linear-gradient(
        to bottom,
        transparent,
        rgba(84, 216, 255, 0.85),
        rgba(143, 125, 255, 1),
        rgba(84, 216, 255, 0.85),
        transparent
      );
      opacity: 0.36;
      filter: blur(0.4px);
    }

    .rift-core {
      width: 0px;
      height: 78vh;
      background: linear-gradient(to bottom, rgba(5, 6, 10, 0.98), rgba(2, 3, 6, 1), rgba(5, 6, 10, 0.98));
      box-shadow:
        0 0 0 1px rgba(84, 216, 255, 0.12),
        0 0 14px rgba(84, 216, 255, 0.14),
        0 0 22px rgba(143, 125, 255, 0.12);
      opacity: 0;
    }

    .rift-glow {
      width: 16px;
      height: 78vh;
      background: linear-gradient(
        to bottom,
        transparent,
        rgba(84, 216, 255, 0.18),
        rgba(143, 125, 255, 0.22),
        rgba(84, 216, 255, 0.18),
        transparent
      );
      filter: blur(10px);
      opacity: 0;
    }

    .rift-aura {
      width: 120px;
      height: 120px;
      background: radial-gradient(circle, rgba(143,125,255,0.18), rgba(84,216,255,0.08), transparent 72%);
      filter: blur(28px);
      opacity: 0;
    }

    .flash-layer {
      z-index: 10;
      background: radial-gradient(circle at center, rgba(255,255,255,0.12), transparent 28%);
      opacity: 0;
    }

    .end-cover {
      z-index: 20;
      background: #020308;
      opacity: 0;
    }

    .hint {
      position: fixed;
      left: 50%;
      bottom: 38px;
      transform: translateX(-50%);
      z-index: 22;
      color: rgba(245,247,255,0.58);
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .hint.show {
      opacity: 1;
    }

    body.playing .dark-layer {
      animation: darken var(--duration) linear forwards;
    }

    body.playing .vignette {
      animation: vignetteGrow var(--duration) linear forwards;
    }

    body.playing .launcher {
      animation: launcherSink var(--duration) linear forwards;
    }

    body.playing .rift-beam {
      animation: beamTransform var(--duration) linear forwards;
    }

    body.playing .rift-core {
      animation: riftConsume var(--duration) cubic-bezier(.22,.78,.18,1) forwards;
    }

    body.playing .rift-glow {
      animation: glowConsume var(--duration) cubic-bezier(.22,.78,.18,1) forwards;
    }

    body.playing .rift-aura {
      animation: auraConsume var(--duration) cubic-bezier(.22,.78,.18,1) forwards;
    }

    body.playing .scene {
      animation: cameraDive var(--duration) cubic-bezier(.22,.78,.18,1) forwards;
    }

    body.playing .flash-layer {
      animation: flashIn var(--duration) linear forwards;
    }

    body.playing .end-cover {
      animation: endFade var(--duration) linear forwards;
    }

    @keyframes darken {
      0% { background: rgba(0,0,0,0); }
      100% { background: rgba(0,0,0,0.74); }
    }

    @keyframes vignetteGrow {
      0% { opacity: 0.2; }
      100% { opacity: 0.82; }
    }

    @keyframes launcherSink {
      0% {
        opacity: 1;
        transform: scale(1);
        filter: blur(0px);
      }
      32% {
        opacity: 0.42;
        transform: scale(0.992);
        filter: blur(0.8px);
      }
      100% {
        opacity: 0;
        transform: scale(0.95);
        filter: blur(8px);
      }
    }

    @keyframes beamTransform {
      0% {
        opacity: 0.36;
        transform: translate(-50%, -50%) scaleX(1);
      }
      18% {
        opacity: 1;
        box-shadow: 0 0 16px rgba(84, 216, 255, 0.55), 0 0 34px rgba(143, 125, 255, 0.24);
      }
      34% {
        opacity: 0;
        transform: translate(-50%, -50%) scaleX(0.08);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scaleX(0.08);
      }
    }

    @keyframes riftConsume {
      0% {
        width: 0px;
        height: 78vh;
        opacity: 0;
      }
      12% {
        width: 6px;
        height: 78vh;
        opacity: 0.9;
      }
      28% {
        width: 22px;
        height: 80vh;
        opacity: 1;
      }
      52% {
        width: 56px;
        height: 96vh;
      }
      74% {
        width: 120px;
        height: 130vh;
      }
      100% {
        width: 220vw;
        height: 220vh;
        opacity: 1;
      }
    }

    @keyframes glowConsume {
      0% {
        width: 16px;
        height: 78vh;
        opacity: 0;
      }
      14% {
        opacity: 0.7;
      }
      30% {
        width: 50px;
        height: 82vh;
        opacity: 1;
      }
      56% {
        width: 120px;
        height: 120vh;
      }
      78% {
        width: 240px;
        height: 170vh;
      }
      100% {
        width: 260vw;
        height: 240vh;
        opacity: 1;
      }
    }

    @keyframes auraConsume {
      0% {
        width: 120px;
        height: 120px;
        opacity: 0;
      }
      16% {
        width: 160px;
        height: 220px;
        opacity: 0.65;
      }
      34% {
        width: 220px;
        height: 360px;
        opacity: 1;
      }
      58% {
        width: 440px;
        height: 760px;
      }
      82% {
        width: 900px;
        height: 1400px;
      }
      100% {
        width: 320vw;
        height: 320vh;
        opacity: 1;
      }
    }

    @keyframes cameraDive {
      0% {
        transform: scale(1);
        filter: blur(0px);
      }
      30% {
        transform: scale(1.04);
        filter: blur(0px);
      }
      58% {
        transform: scale(1.16);
        filter: blur(1px);
      }
      82% {
        transform: scale(1.46);
        filter: blur(4px);
      }
      100% {
        transform: scale(2.2);
        filter: blur(10px);
      }
    }

    @keyframes flashIn {
      0%, 72% { opacity: 0; }
      100% { opacity: 1; }
    }

    @keyframes endFade {
      0%, 82% { opacity: 0; }
      100% { opacity: 1; }
    }

    @media (max-width: 700px) {
      .actions {
        width: 100%;
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }

      .title {
        font-size: 74px;
      }
    }
  </style>
</head>
<body>
  <div class="noise"></div>

  <div class="scene">
    <main class="launcher">
      <div class="launcher-inner">
        <p class="eyebrow">RIFT ABYSS LAUNCHER</p>
        <h1 class="title">裂縫深淵</h1>
        <div class="divider"></div>
        <p class="description">
          在世界崩裂之後，仍有人凝視深淵。真正的入口，不需要喧鬧，
          只需要足夠強的存在感。
        </p>

        <div class="actions">
          <button class="btn btn-primary" id="launchBtn">開始動畫</button>
          <button class="btn" id="replayBtn">重新播放</button>
        </div>

        <div class="meta">
          <span>Version 1.0.0</span>
          <span>Ready</span>
          <span>Windows Build</span>
        </div>

        <p class="status" id="statusText">SYSTEM READY</p>
      </div>
    </main>
  </div>

  <div class="dark-layer"></div>
  <div class="vignette"></div>

  <div class="rift-wrap">
    <div class="rift">
      <div class="rift-aura"></div>
      <div class="rift-glow"></div>
      <div class="rift-core"></div>
      <div class="rift-beam"></div>
    </div>
  </div>

  <div class="flash-layer"></div>
  <div class="end-cover"></div>
  <div class="hint" id="hint">動畫確認後，我再幫你把遊戲接進去</div>

  <script>
    const launchBtn = document.getElementById('launchBtn');
    const replayBtn = document.getElementById('replayBtn');
    const statusText = document.getElementById('statusText');
    const hint = document.getElementById('hint');
    const body = document.body;

    let endTimer = null;
    let playing = false;

    function setStatus(text) {
      statusText.textContent = text;
    }

    function resetAnimation() {
      if (endTimer) clearTimeout(endTimer);
      playing = false;
      hint.classList.remove('show');
      body.classList.remove('playing');

      // 強制重置動畫狀態
      void body.offsetWidth;

      setStatus('SYSTEM READY');
    }

    function playAnimation() {
      if (playing) return;
      resetAnimation();
      playing = true;
      setStatus('ENTERING THE RIFT...');
      body.classList.add('playing');

      endTimer = setTimeout(() => {
        setStatus('ENTRY COMPLETE');
        hint.classList.add('show');
        playing = false;
      }, 3600);
    }

    launchBtn.addEventListener('click', playAnimation);
    replayBtn.addEventListener('click', resetAnimation);
  </script>
</body>
</html>
