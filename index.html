<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>裂縫深淵 - Rift Dive Preview</title>
  <style>
    :root {
      --bg: #04050a;
      --bg-2: #0b0f18;
      --text: #f5f7ff;
      --muted: rgba(245, 247, 255, 0.66);
      --line: rgba(255, 255, 255, 0.08);
      --accent: #8f7dff;
      --accent-2: #59d8ff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: "Segoe UI", "Noto Sans TC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at center, rgba(89, 216, 255, 0.05), transparent 18%),
        radial-gradient(circle at center, rgba(143, 125, 255, 0.08), transparent 30%),
        linear-gradient(180deg, var(--bg), var(--bg-2) 48%, var(--bg));
      position: relative;
    }

    .noise,
    .dark-layer,
    .flash-layer,
    .vignette,
    .scene,
    .rift-stage,
    .end-cover {
      position: fixed;
      inset: 0;
    }

    .noise,
    .dark-layer,
    .flash-layer,
    .vignette,
    .rift-stage,
    .end-cover {
      pointer-events: none;
    }

    .noise {
      opacity: 0.03;
      background-image:
        linear-gradient(rgba(255,255,255,0.4) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.4) 1px, transparent 1px);
      background-size: 4px 4px;
      z-index: 1;
    }

    .scene {
      z-index: 2;
      transform-origin: center center;
    }

    .ambient {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      transition: transform 2s ease, opacity 2s ease;
    }

    .ambient-a {
      width: 300px;
      height: 300px;
      left: 14%;
      top: 16%;
      background: rgba(143, 125, 255, 0.12);
    }

    .ambient-b {
      width: 240px;
      height: 240px;
      right: 14%;
      bottom: 14%;
      background: rgba(89, 216, 255, 0.08);
    }

    .launcher {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      transition: opacity 1.2s ease, transform 1.4s ease, filter 1.2s ease;
    }

    .launcher-inner {
      width: min(920px, 100%);
      text-align: center;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 18px;
    }

    .title {
      font-size: clamp(56px, 10vw, 132px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-shadow: 0 0 26px rgba(143, 125, 255, 0.16);
    }

    .description {
      max-width: 720px;
      margin: 20px auto 0;
      font-size: 15px;
      line-height: 1.9;
      color: var(--muted);
    }

    .actions {
      margin-top: 32px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      min-width: 160px;
      padding: 14px 24px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: 0.25s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      border-color: rgba(143, 125, 255, 0.35);
      background: rgba(255,255,255,0.05);
      box-shadow: 0 0 20px rgba(143, 125, 255, 0.12);
    }

    .btn-primary {
      background: linear-gradient(180deg, rgba(143, 125, 255, 0.16), rgba(255,255,255,0.04));
      border-color: rgba(143, 125, 255, 0.28);
    }

    .meta {
      margin-top: 22px;
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      justify-content: center;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .status {
      margin-top: 18px;
      min-height: 22px;
      color: rgba(89, 216, 255, 0.92);
      font-size: 13px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .dark-layer {
      background: rgba(0, 0, 0, 0);
      transition: background 1.4s ease;
      z-index: 5;
    }

    .vignette {
      z-index: 6;
      background: radial-gradient(circle at center, transparent 35%, rgba(0,0,0,0.22) 70%, rgba(0,0,0,0.55) 100%);
      opacity: 0.2;
      transition: opacity 1.4s ease;
    }

    .rift-stage {
      z-index: 10;
      display: grid;
      place-items: center;
    }

    .rift-outer,
    .rift-inner,
    .rift-glow,
    .rift-core {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    .rift-core {
      width: 2px;
      height: 0;
      border-radius: 999px;
      background: linear-gradient(to bottom, transparent, var(--accent-2), var(--accent), transparent);
      box-shadow: 0 0 18px rgba(143, 125, 255, 1), 0 0 40px rgba(89, 216, 255, 0.24);
      opacity: 0;
      transition: height 1.2s ease, width 1.2s ease, opacity 0.6s ease, box-shadow 1.2s ease;
    }

    .rift-inner {
      width: 0;
      height: 0;
      border-radius: 50% / 8%;
      background: radial-gradient(circle at center, rgba(0,0,0,0.98) 0%, rgba(7,8,14,0.95) 45%, rgba(143,125,255,0.08) 70%, transparent 100%);
      filter: blur(2px);
      opacity: 0;
      transition: width 1.4s ease, height 1.4s ease, opacity 1s ease;
    }

    .rift-outer {
      width: 0;
      height: 0;
      border-radius: 50% / 10%;
      border: 1px solid rgba(89, 216, 255, 0.18);
      box-shadow: inset 0 0 30px rgba(143, 125, 255, 0.18), 0 0 40px rgba(89, 216, 255, 0.12);
      opacity: 0;
      transition: width 1.4s ease, height 1.4s ease, opacity 1s ease;
    }

    .rift-glow {
      width: 0;
      height: 0;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(143,125,255,0.28), rgba(89,216,255,0.12), transparent 72%);
      filter: blur(26px);
      opacity: 0;
      transition: width 1.5s ease, height 1.5s ease, opacity 1s ease;
    }

    .flash-layer {
      z-index: 12;
      background: radial-gradient(circle at center, rgba(255,255,255,0.18), transparent 28%);
      opacity: 0;
    }

    .end-cover {
      background: #020308;
      z-index: 20;
      opacity: 0;
      transition: opacity 0.7s ease;
    }

    .hint {
      position: fixed;
      left: 50%;
      bottom: 36px;
      transform: translateX(-50%);
      z-index: 22;
      color: rgba(245,247,255,0.6);
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .hint.show {
      opacity: 1;
    }

    body.phase-dark .dark-layer {
      background: rgba(0, 0, 0, 0.74);
    }

    body.phase-dark .vignette {
      opacity: 0.72;
    }

    body.phase-dark .ambient-a {
      opacity: 0.4;
      transform: scale(1.12);
    }

    body.phase-dark .ambient-b {
      opacity: 0.35;
      transform: scale(1.08);
    }

    body.phase-rift .rift-core {
      opacity: 1;
      height: 62vh;
    }

    body.phase-open .rift-core {
      width: 14px;
      height: 84vh;
      box-shadow: 0 0 22px rgba(143, 125, 255, 1), 0 0 64px rgba(89, 216, 255, 0.38), 0 0 140px rgba(143,125,255,0.18);
    }

    body.phase-open .rift-inner {
      width: min(22vw, 280px);
      height: min(86vh, 760px);
      opacity: 1;
    }

    body.phase-open .rift-outer {
      width: min(28vw, 360px);
      height: min(92vh, 820px);
      opacity: 1;
    }

    body.phase-open .rift-glow {
      width: 420px;
      height: 420px;
      opacity: 1;
    }

    body.phase-enter .scene {
      animation: diveScene 1800ms cubic-bezier(.55, .08, .88, .32) forwards;
    }

    body.phase-enter .launcher {
      animation: diveLauncher 1200ms ease forwards;
    }

    body.phase-enter .rift-inner {
      animation: diveRiftInner 1800ms cubic-bezier(.55, .08, .88, .32) forwards;
    }

    body.phase-enter .rift-outer {
      animation: diveRiftOuter 1800ms cubic-bezier(.55, .08, .88, .32) forwards;
    }

    body.phase-enter .rift-glow {
      animation: diveRiftGlow 1800ms cubic-bezier(.55, .08, .88, .32) forwards;
    }

    body.phase-enter .flash-layer {
      animation: diveFlash 900ms ease forwards;
    }

    body.phase-fade .end-cover {
      opacity: 1;
    }

    @keyframes diveScene {
      0% {
        transform: scale(1);
        filter: blur(0px);
      }
      20% {
        transform: scale(1.03);
        filter: blur(0px);
      }
      45% {
        transform: scale(1.12);
        filter: blur(1px);
      }
      72% {
        transform: scale(1.42);
        filter: blur(3px);
      }
      100% {
        transform: scale(2.35);
        filter: blur(9px);
      }
    }

    @keyframes diveLauncher {
      0% {
        opacity: 1;
        transform: scale(1);
        filter: blur(0px);
      }
      100% {
        opacity: 0;
        transform: scale(0.92);
        filter: blur(10px);
      }
    }

    @keyframes diveRiftInner {
      0% {
        width: min(22vw, 280px);
        height: min(86vh, 760px);
        opacity: 1;
      }
      25% {
        width: min(24vw, 310px);
        height: 92vh;
      }
      55% {
        width: min(30vw, 390px);
        height: 104vh;
      }
      100% {
        width: min(52vw, 720px);
        height: 145vh;
        opacity: 1;
      }
    }

    @keyframes diveRiftOuter {
      0% {
        width: min(28vw, 360px);
        height: min(92vh, 820px);
        opacity: 1;
      }
      25% {
        width: min(31vw, 410px);
        height: 100vh;
      }
      55% {
        width: min(38vw, 500px);
        height: 112vh;
      }
      100% {
        width: min(64vw, 860px);
        height: 160vh;
        opacity: 1;
      }
    }

    @keyframes diveRiftGlow {
      0% {
        width: 420px;
        height: 420px;
        opacity: 1;
      }
      30% {
        width: 460px;
        height: 460px;
        opacity: 1;
      }
      65% {
        width: 620px;
        height: 620px;
        opacity: 1;
      }
      100% {
        width: 980px;
        height: 980px;
        opacity: 1;
      }
    }

    @keyframes diveFlash {
      0% {
        opacity: 0;
      }
      55% {
        opacity: 0;
      }
      100% {
        opacity: 1;
      }
    }

    @media (max-width: 700px) {
      .actions {
        width: 100%;
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }

      body.phase-open .rift-inner {
        width: 30vw;
      }

      body.phase-open .rift-outer {
        width: 38vw;
      }
    }
  </style>
</head>
<body>
  <div class="noise"></div>

  <div class="scene">
    <div class="ambient ambient-a"></div>
    <div class="ambient ambient-b"></div>

    <main class="launcher" id="launcher">
      <div class="launcher-inner">
        <p class="eyebrow">RIFT ABYSS / RIFT DIVE PREVIEW</p>
        <h1 class="title">裂縫深淵</h1>
        <p class="description">
          裂縫先慢慢打開，等入口真的成形之後，
          再從慢到快把視角整個吸進去。
        </p>

        <div class="actions">
          <button class="btn btn-primary" id="launchBtn">開始動畫</button>
          <button class="btn" id="replayBtn">重新播放</button>
        </div>

        <div class="meta">
          <span>Rift Opening</span>
          <span>Slow To Fast</span>
          <span>Import Later</span>
        </div>

        <p class="status" id="statusText">SYSTEM READY</p>
      </div>
    </main>
  </div>

  <div class="dark-layer"></div>
  <div class="vignette"></div>

  <div class="rift-stage">
    <div class="rift-glow"></div>
    <div class="rift-outer"></div>
    <div class="rift-inner"></div>
    <div class="rift-core"></div>
  </div>

  <div class="flash-layer"></div>
  <div class="end-cover"></div>
  <div class="hint" id="hint">下一步就可以把遊戲接在吸入之後</div>

  <script>
    const launchBtn = document.getElementById('launchBtn');
    const replayBtn = document.getElementById('replayBtn');
    const statusText = document.getElementById('statusText');
    const hint = document.getElementById('hint');

    let timers = [];
    let isPlaying = false;

    function setStatus(text) {
      statusText.textContent = text;
    }

    function schedule(callback, delay) {
      const timer = setTimeout(callback, delay);
      timers.push(timer);
    }

    function clearAllTimers() {
      timers.forEach(clearTimeout);
      timers = [];
    }

    function resetAnimation() {
      clearAllTimers();
      isPlaying = false;
      hint.classList.remove('show');
      document.body.classList.remove(
        'phase-dark',
        'phase-rift',
        'phase-open',
        'phase-enter',
        'phase-fade'
      );
      setStatus('SYSTEM READY');
    }

    function playAnimation() {
      if (isPlaying) return;
      resetAnimation();
      isPlaying = true;

      setStatus('DARKENING THE FIELD...');
      document.body.classList.add('phase-dark');

      schedule(() => {
        setStatus('THE RIFT IS FORMING...');
        document.body.classList.add('phase-rift');
      }, 1100);

      schedule(() => {
        setStatus('THE RIFT IS OPENING...');
        document.body.classList.add('phase-open');
      }, 2300);

      schedule(() => {
        setStatus('THE RIFT IS FULLY OPEN...');
      }, 3600);

      schedule(() => {
        setStatus('ENTERING THE RIFT...');
        document.body.classList.add('phase-enter');
      }, 4250);

      schedule(() => {
        document.body.classList.add('phase-fade');
      }, 6100);

      schedule(() => {
        setStatus('ENTRY COMPLETE');
        hint.classList.add('show');
        isPlaying = false;
      }, 6900);
    }

    launchBtn.addEventListener('click', playAnimation);
    replayBtn.addEventListener('click', resetAnimation);
  </script>
</body>
</html>
